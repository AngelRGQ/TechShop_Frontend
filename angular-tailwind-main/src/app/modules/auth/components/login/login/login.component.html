<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

    <!-- Logo / Título -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-600 rounded-xl mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">TechShop</h1>
      <p class="text-sm text-gray-500 mt-1">Inicia sesión en tu cuenta</p>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">
      {{ error }}
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onLogin()" #loginForm="ngForm">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          Correo electrónico
        </label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="correotechshop.com"
          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm
                 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100
                 transition-all placeholder:text-gray-400"
        />
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          Contraseña
        </label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="••••••••"
          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm
                 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100
                 transition-all placeholder:text-gray-400"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading || !email || !password"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed
               text-white font-medium py-2.5 rounded-xl text-sm transition-all">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading">Cargando...</span>
      </button>

    </form>

    <!-- Credenciales de prueba -->
    <div class="mt-6 p-3 bg-gray-50 rounded-xl border border-gray-100 text-xs text-gray-500 text-center">
      <p class="font-medium text-gray-600 mb-1">Credenciales de prueba</p>
      <p>admintechshop.com / 123456</p>
    </div>

  </div>
</div>
